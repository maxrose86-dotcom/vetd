
[functions.create-daily-room]
enabled = true
verify_jwt = true
import_map = "./functions/create-daily-room/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/create-daily-room/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/create-daily-room/*.html" ]

[functions.send-reminders]
enabled = true
verify_jwt = false
import_map = "./functions/send-reminders/deno.json"
entrypoint = "./functions/send-reminders/index.ts"

[functions.send-day-before-reminders]
enabled = true
verify_jwt = false
import_map = "./functions/send-day-before-reminders/deno.json"
entrypoint = "./functions/send-day-before-reminders/index.ts"

[functions.get-metrics]
enabled = true
verify_jwt = false
import_map = "./functions/get-metrics/deno.json"
entrypoint = "./functions/get-metrics/index.ts"
