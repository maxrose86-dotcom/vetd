<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vetd — Sign in</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Figtree:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: #1D9E75;
    --green-light: #E1F5EE;
    --green-mid: #5DCAA5;
    --green-dark: #0F6E56;
    --coral: #D85A30;
    --gray-50: #F7F6F2;
    --gray-100: #EDECEA;
    --gray-200: #D3D1C7;
    --gray-400: #888780;
    --gray-700: #444441;
    --gray-900: #1C1B19;
    --serif: 'DM Serif Display', serif;
    --sans: 'Figtree', sans-serif;
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 18px;
    --radius-xl: 24px;
  }

  body {
    font-family: var(--sans);
    background: var(--gray-900);
    color: var(--gray-900);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.5;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    position: relative;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: absolute;
    width: 600px; height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(29,158,117,0.25) 0%, transparent 70%);
    top: -200px; left: 50%; transform: translateX(-50%);
    pointer-events: none;
  }

  .login-card {
    background: #fff;
    border-radius: var(--radius-xl);
    padding: 2.5rem;
    width: 100%;
    max-width: 420px;
    position: relative;
    z-index: 1;
    animation: fadeUp 0.4s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .logo {
    font-family: var(--serif);
    font-size: 36px;
    text-align: center;
    margin-bottom: 0.25rem;
    color: var(--gray-900);
  }
  .logo span { color: var(--green-mid); }

  .login-subtitle {
    text-align: center;
    color: var(--gray-400);
    font-size: 14px;
    font-weight: 300;
    margin-bottom: 2rem;
  }

  label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: var(--gray-700);
    margin-bottom: 6px;
  }

  input[type=email], input[type=password] {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid var(--gray-200);
    border-radius: var(--radius-sm);
    font-family: var(--sans);
    font-size: 14px;
    color: var(--gray-900);
    background: #fff;
    transition: border-color 0.15s;
    outline: none;
  }
  input:focus { border-color: var(--green); }

  .field { margin-bottom: 1.25rem; }

  .forgot-link {
    display: block;
    text-align: right;
    font-size: 12px;
    color: var(--green);
    text-decoration: none;
    margin-top: 6px;
    cursor: pointer;
  }
  .forgot-link:hover { text-decoration: underline; }

  .btn-login {
    width: 100%;
    padding: 14px;
    background: var(--green);
    color: #fff;
    border-radius: 100px;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    font-family: var(--sans);
    transition: background 0.15s, transform 0.1s;
    margin-top: 0.5rem;
  }
  .btn-login:hover { background: var(--green-dark); transform: translateY(-1px); }
  .btn-login:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

  .divider {
    text-align: center;
    color: var(--gray-400);
    font-size: 12px;
    margin: 1.5rem 0;
    position: relative;
  }
  .divider::before, .divider::after {
    content: '';
    position: absolute;
    top: 50%;
    width: 40%;
    height: 1px;
    background: var(--gray-100);
  }
  .divider::before { left: 0; }
  .divider::after { right: 0; }

  .signup-link {
    text-align: center;
    font-size: 14px;
    color: var(--gray-400);
    font-weight: 300;
  }
  .signup-link a {
    color: var(--green);
    text-decoration: none;
    font-weight: 500;
  }
  .signup-link a:hover { text-decoration: underline; }

  .error-msg {
    background: var(--coral);
    color: #fff;
    padding: 10px 14px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    margin-bottom: 1rem;
    display: none;
    animation: fadeUp 0.2s ease;
  }
  .error-msg.show { display: block; }

  .success-msg {
    background: var(--green-light);
    color: var(--green-dark);
    padding: 10px 14px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    margin-bottom: 1rem;
    display: none;
    animation: fadeUp 0.2s ease;
  }
  .success-msg.show { display: block; }

  /* Reset password view */
  .view { display: none; }
  .view.active { display: block; }

  .back-link {
    font-size: 13px;
    color: var(--gray-400);
    cursor: pointer;
    margin-bottom: 1.5rem;
    display: inline-block;
  }
  .back-link:hover { color: var(--gray-700); }

  @media (max-width: 480px) {
    .login-card { padding: 2rem 1.5rem; }
  }
</style>
</head>
<body>

<div class="login-card">
  <div class="logo">Vet<span>d</span></div>
  <div class="login-subtitle">Welcome back</div>

  <!-- LOGIN VIEW -->
  <div class="view active" id="view-login">
    <div class="error-msg" id="login-error"></div>

    <div class="field">
      <label>Email address</label>
      <input type="email" id="login-email" placeholder="you@example.com">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="Your password">
      <a class="forgot-link" onclick="showView('forgot')">Forgot password?</a>
    </div>

    <button class="btn-login" id="btn-login" onclick="handleLogin()">Sign in</button>

    <div class="divider">or</div>

    <div class="signup-link">
      Don't have an account? <a href="index.html">Sign up free</a>
    </div>
  </div>

  <!-- FORGOT PASSWORD VIEW -->
  <div class="view" id="view-forgot">
    <div class="back-link" onclick="showView('login')">← Back to sign in</div>

    <div style="margin-bottom:1.5rem">
      <h2 style="font-family:var(--serif);font-size:24px;margin-bottom:4px">Reset your password</h2>
      <p style="color:var(--gray-400);font-size:13px;font-weight:300">Enter your email and we'll send you a reset link.</p>
    </div>

    <div class="error-msg" id="forgot-error"></div>
    <div class="success-msg" id="forgot-success"></div>

    <div class="field">
      <label>Email address</label>
      <input type="email" id="forgot-email" placeholder="you@example.com">
    </div>

    <button class="btn-login" id="btn-forgot" onclick="handleForgot()">Send reset link</button>
  </div>
</div>

<script>
  // ─── SUPABASE INIT ───────────────────────────────────────
  // ⚠️  REPLACE these with your real Supabase project values
  //     (same values as in your index.html)
  const SUPABASE_URL  = 'https://klvhkpnwesajufvtbwlk.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtsdmhrcG53ZXNhanVmdnRid2xrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyODMyNTIsImV4cCI6MjA5MDg1OTI1Mn0.NxvPHfat8B0cmSvNoC4Nv-frk-m2ylb7LlWvDUwN_4I';

  let db = null;
  try {
    if (window.supabase && window.supabase.createClient) {
      db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
    }
  } catch(e) {
    console.warn('Supabase SDK not loaded');
  }

  // ─── VIEW SWITCHING ─────────────────────────────────────
  function showView(name) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById('view-' + name).classList.add('active');
    // Clear errors
    document.querySelectorAll('.error-msg, .success-msg').forEach(e => {
      e.classList.remove('show');
      e.textContent = '';
    });
  }

  // ─── LOGIN ──────────────────────────────────────────────
  async function handleLogin() {
    const email    = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    const errorEl  = document.getElementById('login-error');
    const btn      = document.getElementById('btn-login');

    errorEl.classList.remove('show');

    if (!email || !password) {
      errorEl.textContent = 'Please enter your email and password';
      errorEl.classList.add('show');
      return;
    }

    if (!db) {
      // Demo mode — just redirect
      window.location.href = 'index.html';
      return;
    }

    btn.textContent = 'Signing in…';
    btn.disabled = true;

    try {
      const { data, error } = await db.auth.signInWithPassword({ email, password });

      if (error) throw error;

      // Check the user's role and redirect accordingly
      const role = data.user?.user_metadata?.role || 'contributor';

      if (role === 'contributor') {
        window.location.href = 'index.html?logged_in=1';
      } else if (role === 'client') {
        window.location.href = 'vetd-client.html';
      } else {
        window.location.href = 'vetd-admin.html';
      }

    } catch (err) {
      errorEl.textContent = err.message || 'Sign in failed — check your email and password';
      errorEl.classList.add('show');
      btn.textContent = 'Sign in';
      btn.disabled = false;
    }
  }

  // ─── FORGOT PASSWORD ───────────────────────────────────
  async function handleForgot() {
    const email     = document.getElementById('forgot-email').value.trim();
    const errorEl   = document.getElementById('forgot-error');
    const successEl = document.getElementById('forgot-success');
    const btn       = document.getElementById('btn-forgot');

    errorEl.classList.remove('show');
    successEl.classList.remove('show');

    if (!email) {
      errorEl.textContent = 'Please enter your email';
      errorEl.classList.add('show');
      return;
    }

    if (!db) {
      successEl.textContent = 'Demo mode — no email sent';
      successEl.classList.add('show');
      return;
    }

    btn.textContent = 'Sending…';
    btn.disabled = true;

    try {
      const { error } = await db.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.origin + '/login.html'
      });

      if (error) throw error;

      successEl.textContent = 'Check your inbox — we sent you a reset link.';
      successEl.classList.add('show');
      btn.textContent = 'Sent!';

    } catch (err) {
      errorEl.textContent = err.message || 'Something went wrong — try again';
      errorEl.classList.add('show');
      btn.textContent = 'Send reset link';
      btn.disabled = false;
    }
  }

  // ─── ENTER KEY SUPPORT ─────────────────────────────────
  document.getElementById('login-password').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') handleLogin();
  });
  document.getElementById('login-email').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') document.getElementById('login-password').focus();
  });
  document.getElementById('forgot-email').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') handleForgot();
  });
</script>
</body>
</html>
